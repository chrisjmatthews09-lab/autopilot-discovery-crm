<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Autopilot</title>
  <script>
    // SPA fallback for GitHub Pages: encode the path and redirect to index,
    // where a decoder restores the original URL via history.replaceState.
    // Based on https://github.com/rafgraph/spa-github-pages
    (function () {
      var segmentCount = 1; // /autopilot-discovery-crm/ prefix depth
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
